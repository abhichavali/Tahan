name: Build images

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'setup.py'
      - 'hanat/**'
      - '.github/workflows/build-gpu-image.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            base_image: ubuntu:24.04
            cuda_tag: cpu
          - variant: gpu
            base_image: nvidia/cuda:12.6.3-cudnn-runtime-ubuntu24.04
            cuda_tag: cu124
    steps:
      - uses: actions/checkout@v4

      - name: Free up runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL
          df -h

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            CUDA_TAG=${{ matrix.cuda_tag }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hanat:${{ matrix.variant }}
            ${{ secrets.DOCKERHUB_USERNAME }}/hanat:${{ matrix.variant }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
